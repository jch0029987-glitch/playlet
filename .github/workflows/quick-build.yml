name: Jeremy's Custom Full Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # We need full history for the git-hash script to work
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Reset local changes
        # This clears the "Found changed files" error by resetting the workspace
        run: git checkout .

      - name: Build Full Project
        run: npm run build:release
        env:
          ROKU_DEV_TARGET: 127.0.0.1
          ROKU_DEVPASSWORD: password
          # Adding this helps the version-sync tool feel safer
          CI: true 

      - name: Bundle & Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: playlet-full-package
          path: |
            release/*.zip
            playlet-app/out/*.zip
            build/*.zip
          if-no-files-found: error

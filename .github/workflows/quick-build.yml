name: Manual Quick Build

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Playlet Lib
        run: |
          cd playlet-lib
          npm run test:build

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: playlet-lib-custom
          # This path points to where bsc usually drops the zip
          path: build/playlet-lib-tests.zip
          if-no-files-found: error

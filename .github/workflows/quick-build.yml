name: Jeremy's Custom Full Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Full Project
        # 'build:release' is the specific script Playlet uses to bundle everything
        run: npm run build:release
        env:
          ROKU_DEV_TARGET: 127.0.0.1
          ROKU_DEVPASSWORD: password

      - name: Bundle & Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: playlet-full-package
          # We check both the release and out folders just to be safe
          path: |
            release/*.zip
            playlet-app/out/*.zip
            build/*.zip
          if-no-files-found: error

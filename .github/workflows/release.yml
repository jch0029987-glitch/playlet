name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for the git-hash versioning script

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Playlet
        # We run the official build script but pass dummy IP/Passwords 
        # so the 'roku-deploy' library doesn't crash the process.
        run: npm run build:release
        env:
          ROKU_DEV_TARGET: 127.0.0.1
          ROKU_DEVPASSWORD: password
          ROKU_SIGN_PASSWORD: password
          CI: true

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playlet-production-zips
          # The official 'build:release' script outputs to the /release folder
          path: |
            release/playlet.zip
            release/playlet-lib.zip
          if-no-files-found: error

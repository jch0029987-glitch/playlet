name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pre-build Git Setup
        # This makes the repo "clean" in the eyes of the version-sync scripts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "temp: pre-build commit for custom fixes" || echo "No changes to commit"

      - name: Build Playlet for release
        # Now that git status is 'clean', these scripts will pass
        run: npm run build:release
        env:
          ROKU_DEV_TARGET: 127.0.0.1
          ROKU_DEVPASSWORD: password
          ROKU_SIGN_PASSWORD: password
          CI: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playlet-release-package
          path: |
            release/*.zip
            release/*.pkg
          if-no-files-found: error
